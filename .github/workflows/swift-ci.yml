name: Swift CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint

      - name: Build
        run: swift build -c release
